name: Morning Weather Bot

on:
  schedule:
    - cron: '0 0 * * *' # 매일 방콕 시간 아침 7시 (영국 표준시 00:00)
  workflow_dispatch: # 수동 실행 버튼 활성화

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run script
        # 💡 여기가 핵심입니다! 금고(Secrets)에 있는 좌표와 이름을 파이썬 프로그램에게 전달해 주는 구역입니다.
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
          WEATHER_LAT: ${{ secrets.WEATHER_LAT }}
          WEATHER_LON: ${{ secrets.WEATHER_LON }}
          WEATHER_NAME: ${{ secrets.WEATHER_NAME }}
        run: python main.py
