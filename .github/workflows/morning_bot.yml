name: Morning Briefing Bot

on:
  schedule:
    # ⏰ 시간 기준은 UTC(세계 표준시)입니다.
    # 방콕 시간(ICT) 아침 07:00 = UTC 전날 밤 24:00 ➔ 당일 00:00 입니다.
    # 매일 방콕 시간 아침 7시에 정각 실행되도록 크론 설정을 잡아둡니다.
    - cron: '0 0 * * *'
  workflow_dispatch: # 버튼을 눌러 수동으로 즉시 실행할 수 있는 기능 활성화

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: 저장소 코드 가져오기
      uses: actions/checkout@v4

    - name: 파이썬 환경 설정
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 의존성 라이브러리 설치
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 봇 실행 및 전송
      env:
        # 🔒 금고(Secrets)에 보관된 열쇠를 실행 순간에만 가상 서버 환경변수로 주입합니다.
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
        CITY: "Bangkok"
      run: python main.py
