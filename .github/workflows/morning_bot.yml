name: Morning Weather Bot

on:
  schedule:
    - cron: '55 4 * * *' # 💡 태국 시간 오전 11시 55분 (UTC 04:55)에 실행 예약
  workflow_dispatch: # 수동 실행 버튼 유지

# 아래 jobs: 부분은 기존 내용 그대로 두시면 됩니다.

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests yfinance

      - name: Run script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
          WEATHER_LAT: ${{ secrets.WEATHER_LAT }}
          WEATHER_LON: ${{ secrets.WEATHER_LON }}
          WEATHER_NAME: ${{ secrets.WEATHER_NAME }}
        run: python main.py
